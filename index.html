<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MindAR Custom UI + Video</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* ---- MUTE BUTTON ---- */
    #muteButton {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      z-index: 20;
      cursor: pointer;
    }

    /* ---- SCAN OVERLAY ---- */
    #scanOverlay {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 15;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #scanOverlay img {
      width: 60%;
      opacity: 0.2; /* 20% transparency */
    }

    /* ---- SWEEP ANIMATION ---- */
    #sweep {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.25) 50%,
        rgba(255,255,255,0) 100%
      );
      animation: sweepAnim 2.5s infinite;
    }

    @keyframes sweepAnim {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
  </style>
</head>

<body>

  <!-- ---- CUSTOM SCAN UI ---- -->
  <div id="scanOverlay">
    <img src="assets/target-overlay.jpg" />
    <div id="sweep"></div>
  </div>

  <!-- ---- MUTE BUTTON ---- -->
  <img id="muteButton" src="assets/icons/mute.png" />

  <!-- ---- VIDEO ---- -->
  <video
    id="video"
    src="assets/video.mp4"
    preload="auto"
    loop
    playsinline
    webkit-playsinline
    muted
    crossorigin="anonymous"
  ></video>

  <!-- ---- AR SCENE ---- -->
  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; uiScanning: no; uiLoading: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        src="#video"
        width="1"
        height="1.83"
        position="0 0 0"
      ></a-video>
    </a-entity>

  </a-scene>

  <script>
    const video = document.querySelector("#video");
    const target = document.querySelector("#target");
    const muteBtn = document.querySelector("#muteButton");
    const scanOverlay = document.querySelector("#scanOverlay");

    let isMuted = true;

    // ---- TARGET EVENTS ----
    target.addEventListener("targetFound", () => {
      scanOverlay.style.display = "none";
      video.play();
    });

    target.addEventListener("targetLost", () => {
      scanOverlay.style.display = "flex";
      video.pause();
    });

    // ---- MUTE BUTTON ----
    muteBtn.addEventListener("click", () => {
      isMuted = false;
      video.muted = false;

      // hide button after unmute
      muteBtn.style.display = "none";
    });

    // ---- LOOP SAFETY ----
    video.addEventListener("ended", () => {
      video.play();
    });

    // ---- MOBILE AUTOPLAY FIX ----
    document.body.addEventListener("click", () => {
      video.play().catch(() => {});
    });
  </script>

</body>
</html>
