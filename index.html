<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MindAR Custom UI + Video</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }
/* ---- SCAN TEXT (GLASS UI) ---- */
#scanText {
  position: absolute;
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);

  padding: 10px 18px;
  border-radius: 14px;

  color: white;
  font-size: 14px;
  letter-spacing: 0.3px;

  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border: 1px solid rgba(255, 255, 255, 0.15);

  box-shadow: 0 4px 20px rgba(0,0,0,0.2);

  text-align: center;
  white-space: nowrap;
}
    /* ---- MUTE BUTTON ---- */
    #muteButton {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      z-index: 20;
      cursor: pointer;
    }

    /* ---- SCAN OVERLAY ---- */
    #scanOverlay {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 15;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #scanOverlay img {
      width: 60%;
      opacity: 0.7;
    }
    @media (max-width: 600px) {
  #scanText {
    font-size: 12px;
    padding: 8px 14px;
  }
}
    /* ---- SWEEP ANIMATION ---- */
    #sweep {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.25) 50%,
        rgba(255,255,255,0) 100%
      );
      animation: sweepAnim 2.5s infinite;
    }

    @keyframes sweepAnim {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    /* ---- SCAN FRAME ---- */
#scanFrame {
  position: absolute;
  width: 60%;   /* match your image width */
  aspect-ratio: 1 / 1.4; /* adjust if needed to match artwork */
  pointer-events: none;
}

/* base corner style */
.corner {
  position: absolute;
  width: 30px;
  height: 30px;
  border: 2px solid rgba(255,255,255,0.8);
}

/* remove inner sides to create L-shape */
.corner.tl {
  top: 0;
  left: 0;
  border-right: none;
  border-bottom: none;
}

.corner.tr {
  top: 0;
  right: 0;
  border-left: none;
  border-bottom: none;
}

.corner.bl {
  bottom: 0;
  left: 0;
  border-right: none;
  border-top: none;
}

.corner.br {
  bottom: 0;
  right: 0;
  border-left: none;
  border-top: none;
}

    .corner {
  animation: cornerPulse 2s ease-in-out infinite;
}

@keyframes cornerPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
  </style>
</head>

<body>

  <!-- ---- CUSTOM SCAN UI ---- -->
  <div id="scanOverlay">
    <img src="assets/target-overlay.jpg" />    
  <div id="scanFrame">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
  </div>
    <div id="scanText">Scan the artwork</div>
    <div id="sweep"></div>
  </div>

  <!-- ---- MUTE BUTTON ---- -->
  <img id="muteButton" src="assets/icons/mute.png" />

  

  <!-- ---- AR SCENE ---- -->
  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; uiScanning: no; uiLoading: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
   <a-assets>
  <video
    id="video"
    src="assets/video.mp4"
    preload="auto"
    loop
    playsinline
    webkit-playsinline
    muted
    crossorigin="anonymous"
  ></video></a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        src="#video"
        width="1"
        height="1.83"
        position="0 0 0"
      ></a-video>
    </a-entity>

  </a-scene>

  <script>
  const video = document.querySelector("#video");
  const target = document.querySelector("#target");
  const muteBtn = document.querySelector("#muteButton");
  const scanOverlay = document.querySelector("#scanOverlay");

  let hideTimeout = null;

  // ---- INITIAL STATE ----
  video.muted = true;
  muteBtn.style.display = "none";

  // ---- TARGET FOUND ----
  target.addEventListener("targetFound", () => {
    scanOverlay.style.display = "none";

    // show mute icon (audio OFF state)
    muteBtn.src = "assets/icons/mute.png";
    muteBtn.style.display = "block";

    video.play();
  });

  // ---- TARGET LOST ----
  target.addEventListener("targetLost", () => {
    scanOverlay.style.display = "flex";

    video.pause();

    // hide button and clear timer
    muteBtn.style.display = "none";
    clearTimeout(hideTimeout);
  });

  // ---- BUTTON CLICK ----
  muteBtn.addEventListener("click", () => {
    // switch to audio ON
    video.muted = false;
    muteBtn.src = "assets/icons/unmute.png";

    // clear any previous timer
    clearTimeout(hideTimeout);

    // hide after 3 seconds
    hideTimeout = setTimeout(() => {
      muteBtn.style.display = "none";
    }, 3000);
  });

  // ---- LOOP SAFETY ----
  video.addEventListener("ended", () => {
    video.play();
  });

  // ---- MOBILE AUTOPLAY FIX ----
  document.body.addEventListener("click", () => {
    video.play().catch(() => {});
  });
</script>

</body>
</html>
