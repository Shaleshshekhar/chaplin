<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MindAR Custom UI + Video</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* ---- AUDIO BUTTON (GLASS) ---- */
    #muteWrapper {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;

      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);

      display: flex;
      justify-content: center;
      align-items: center;

      z-index: 20;
    }

    #muteButton {
      width: 26px;
      height: 26px;
      cursor: pointer;
    }

    /* ---- SCAN OVERLAY ---- */
    #scanOverlay {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 15;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ---- TARGET WRAPPER ---- */
    #scanTarget {
      position: relative;
      width: 50%;
    }

    /* GLASS PANEL */
    #glassPlate {
      position: absolute;
      inset: -8px;

      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);

      z-index: 0;
    }

    /* IMAGE */
    #scanTarget img {
      position: relative;
      width: 100%;
      display: block;
      opacity: 0.65;
      border-radius: 18px;
      z-index: 1;
    }

    /* ---- SCAN TEXT ---- */
    #scanText {
      position: absolute;
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%);

      padding: 12px 20px;
      border-radius: 16px;

      color: white;
      font-size: 16px;
      font-weight: 500;

      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    }

    /* ---- SWEEP ---- */
    #sweep {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.25) 50%,
        rgba(255,255,255,0) 100%
      );
      animation: sweepAnim 2.5s infinite;
    }

    @keyframes sweepAnim {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    /* ---- MOBILE ---- */
    @media (max-width: 600px) {
      #scanTarget {
        width: 70%;
      }

      #scanText {
        font-size: 14px;
        padding: 10px 16px;
      }

      #muteWrapper {
        width: 48px;
        height: 48px;
      }

      #muteButton {
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>

<body>

  <!-- SCAN UI -->
  <div id="scanOverlay">

    <div id="scanTarget">
      <div id="glassPlate"></div>
      <img src="assets/target-overlay.jpg" />
    </div>

    <div id="scanText">Scan the artwork</div>
    <div id="sweep"></div>

  </div>

  <!-- AUDIO BUTTON -->
  <div id="muteWrapper" style="display:none;">
    <img id="muteButton" src="assets/icons/mute.png" />
  </div>

  <!-- AR SCENE -->
  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; uiScanning: no; uiLoading: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets>
      <video
        id="video"
        src="assets/video.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        muted
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        src="#video"
        width="1"
        height="1.83"
        position="0 0 0"
      ></a-video>
    </a-entity>

  </a-scene>

  <script>
    const video = document.querySelector("#video");
    const target = document.querySelector("#target");
    const muteBtn = document.querySelector("#muteButton");
    const muteWrapper = document.querySelector("#muteWrapper");
    const scanOverlay = document.querySelector("#scanOverlay");

    let hideTimeout = null;

    video.muted = true;
    muteWrapper.style.display = "none";

    target.addEventListener("targetFound", () => {
      scanOverlay.style.display = "none";

      muteBtn.src = "assets/icons/mute.png";
      muteWrapper.style.display = "flex";

      video.play();
    });

    target.addEventListener("targetLost", () => {
      scanOverlay.style.display = "flex";

      video.pause();

      muteWrapper.style.display = "none";
      clearTimeout(hideTimeout);
    });

    muteBtn.addEventListener("click", () => {
      video.muted = false;
      muteBtn.src = "assets/icons/unmute.png";

      clearTimeout(hideTimeout);

      hideTimeout = setTimeout(() => {
        muteWrapper.style.display = "none";
      }, 3000);
    });

    video.addEventListener("ended", () => {
      video.play();
    });

    document.body.addEventListener("click", () => {
      video.play().catch(() => {});
    });
  </script>

</body>
</html>
