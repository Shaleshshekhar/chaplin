<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Poster</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- UI -->
<div id="ui">
  <div id="scan-message">Scan artwork</div>
  <div id="scan-effect"></div>

  <img id="muteBtn" src="assets/icons/mute.png">
  <img id="replayBtn" src="assets/icons/replay.png">
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;"
  mindar-image="imageTargetSrc: assets/targets.mind;"
>

  <a-assets>
    <video id="video" src="assets/video.mp4" preload="auto" playsinline></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Glow -->
    <a-plane
      id="glow"
      width="1.15"
      height="0.75"
      color="#00ffff"
      opacity="0"
      position="0 0 -0.01">
    </a-plane>

    <!-- Video -->
    <a-video
      id="videoPlane"
      src="#video"
      width="1"
      height="0.6"
      position="0 0 0"
      material="opacity: 0">
    </a-video>

  </a-entity>

</a-scene>

<script src="main.js"></script>

</body>
</html>
