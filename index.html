<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MindAR Video Tracking</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    /* Mute button */
    #muteButton {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      z-index: 10;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Mute / Unmute Button -->
  <img id="muteButton" src="assets/icons/mute.png" />

  <!-- Video Asset -->
  <video
    id="video"
    src="assets/video.mp4"
    preload="auto"
    loop
    playsinline
    webkit-playsinline
    muted
    crossorigin="anonymous"
  ></video>

  <!-- AR Scene -->
  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets></a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target -->
    <a-entity id="target" mindar-image-target="targetIndex: 0">

      <!-- Video Plane -->
      <a-video
        id="videoPlane"
        src="#video"
        width="1"
        height="1.83"
        position="0 0 0"
      ></a-video>

    </a-entity>

  </a-scene>

  <script>
    const video = document.querySelector("#video");
    const target = document.querySelector("#target");
    const muteBtn = document.querySelector("#muteButton");

    let isMuted = true;

    // ---- TARGET EVENTS ----
    target.addEventListener("targetFound", () => {
      video.play();
    });

    target.addEventListener("targetLost", () => {
      video.pause();
    });

    // ---- MUTE TOGGLE ----
    muteBtn.addEventListener("click", () => {
      isMuted = !isMuted;
      video.muted = isMuted;

      muteBtn.src = isMuted
        ? "assets/icons/mute.png"
        : "assets/icons/unmute.png";
    });

    // ---- ENSURE LOOP RELIABILITY ----
    video.addEventListener("ended", () => {
      video.play(); // fallback loop
    });

    // ---- MOBILE AUTOPLAY FIX ----
    document.body.addEventListener("click", () => {
      video.play().catch(() => {});
    });
  </script>

</body>
</html>
